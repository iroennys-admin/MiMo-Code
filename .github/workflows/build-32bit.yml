name: Build 32-bit Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.1-32bit)'
        required: true
        default: 'v0.1.1-32bit'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Linux 32-bit package
        run: |
          mkdir -p dist/linux-ia32
          
          # Create bash launcher
          cat > dist/linux-ia32/mimo << 'LAUNCHER'
          #!/usr/bin/env bash
          # MiMo-Code 32-bit launcher for Linux
          # Uses Node.js + npm since Bun doesn't support 32-bit
          set -e
          
          if ! command -v node &> /dev/null; then
            echo "Error: Node.js is required. Install Node.js 18+ (32-bit) from https://nodejs.org/"
            exit 1
          fi
          
          NODE_MAJOR=$(node -e "console.log(process.versions.node.split('.')[0])")
          if [ "$NODE_MAJOR" -lt 18 ]; then
            echo "Error: Node.js 18+ required. Current: $(node --version)"
            exit 1
          fi
          
          if command -v npx &> /dev/null; then
            exec npx --yes @mimo-ai/cli@0.1.1 "$@"
          fi
          
          echo "Error: npx not found. Install npm (comes with Node.js)."
          exit 1
          LAUNCHER
          chmod +x dist/linux-ia32/mimo
          
          # Create Node.js launcher
          cat > dist/linux-ia32/mimo-node << 'NODELAUNCHER'
          #!/usr/bin/env node
          "use strict";
          const { execSync } = require("child_process");
          const args = process.argv.slice(2).join(" ");
          try {
            execSync(`npx --yes @mimo-ai/cli@0.1.1 ${args}`, { stdio: "inherit" });
          } catch (e) { process.exit(e.status || 1); }
          NODELAUNCHER
          chmod +x dist/linux-ia32/mimo-node
          
          # Create install script
          cat > dist/linux-ia32/install.sh << 'INSTALL'
          #!/usr/bin/env bash
          set -e
          echo "=== MiMo-Code 32-bit Installer (Linux) ==="
          if ! command -v node &> /dev/null; then
            echo "Node.js not found. Install Node.js 18+ (32-bit) from https://nodejs.org/"
            exit 1
          fi
          echo "Node.js: $(node --version)"
          if ! command -v npm &> /dev/null; then
            echo "npm not found."
            exit 1
          fi
          echo "Installing @mimo-ai/cli globally..."
          npm install -g @mimo-ai/cli@0.1.1
          echo "Done! Run: mimo --help"
          INSTALL
          chmod +x dist/linux-ia32/install.sh
          
          # Create README
          cat > dist/linux-ia32/README.md << 'README'
          # MiMo-Code 32-bit (Linux ia32/x86)
          
          Unofficial 32-bit build of MiMo-Code using Node.js runtime.
          
          ## Requirements
          - Node.js 18+ (32-bit) - https://nodejs.org/
          - npm (comes with Node.js)
          
          ## Install
          ```bash
          chmod +x install.sh && ./install.sh
          ```
          
          ## Run
          ```bash
          ./mimo --help
          # or
          npx --yes @mimo-ai/cli@0.1.1 --help
          ```
          README
          
          cd dist/linux-ia32
          tar -czf ../../mimocode-linux-ia32.tar.gz *

      - name: Create Windows 32-bit package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows-ia32
          
          # .cmd launcher
          @"
          @echo off
          npx --yes @mimo-ai/cli@0.1.1 %*
          "@ | Out-File -FilePath "dist\windows-ia32\mimo.cmd" -Encoding ascii
          
          # PowerShell launcher
          @"
          npx --yes @mimo-ai/cli@0.1.1 @args
          "@ | Out-File -FilePath "dist\windows-ia32\mimo.ps1" -Encoding utf8
          
          # Install script
          @"
          @echo off
          echo === MiMo-Code 32-bit Installer (Windows) ===
          where node >nul 2>&1
          if %ERRORLEVEL% NEQ 0 (
            echo Node.js not found. Install Node.js 18+ ^(32-bit^) from https://nodejs.org/
            exit /b 1
          )
          echo Node.js:
          node --version
          echo Installing @mimo-ai/cli globally...
          npm install -g @mimo-ai/cli@0.1.1
          echo Done! Run: mimo --help
          "@ | Out-File -FilePath "dist\windows-ia32\install.cmd" -Encoding ascii
          
          # README
          @"
          # MiMo-Code 32-bit (Windows ia32/x86)
          
          Unofficial 32-bit build using Node.js runtime.
          
          ## Requirements
          - Node.js 18+ (32-bit) - https://nodejs.org/
          
          ## Install
          Run: install.cmd
          
          ## Run
          mimo.cmd --help
          "@ | Out-File -FilePath "dist\windows-ia32\README.md" -Encoding utf8
          
          Compress-Archive -Path dist\windows-ia32\* -DestinationPath mimocode-windows-ia32.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "MiMo-Code ${{ github.event.inputs.version }} (32-bit)"
          body: |
            ## MiMo-Code 32-bit (ia32/x86) Build
            
            This is an **unofficial 32-bit build** of [MiMo-Code](https://github.com/XiaomiMiMo/MiMo-Code).
            
            > ⚠️ **Bun does not support 32-bit architectures.** This build uses **Node.js** as the runtime instead, via the official `@mimo-ai/cli` npm package.
            
            ### Requirements
            - **Node.js 18+** (32-bit) - https://nodejs.org/en/download/
            - **npm** (comes with Node.js)
            
            ### Downloads
            
            | File | Platform | Arch |
            |------|----------|------|
            | `mimocode-linux-ia32.tar.gz` | Linux | x86 (32-bit) |
            | `mimocode-windows-ia32.zip` | Windows | x86 (32-bit) |
            
            ### Quick Install (Linux)
            ```bash
            tar -xzf mimocode-linux-ia32.tar.gz
            chmod +x install.sh && ./install.sh
            # Or run directly:
            npx --yes @mimo-ai/cli@0.1.1 --help
            ```
            
            ### Quick Install (Windows)
            ```powershell
            # Extract zip, then:
            .\install.cmd
            # Or run directly:
            npx --yes @mimo-ai/cli@0.1.1 --help
            ```
            
            ### Alternative: Direct npm install
            ```bash
            npm install -g @mimo-ai/cli@0.1.1
            mimo --help
            ```
            
            Based on upstream [MiMo-Code v0.1.1](https://github.com/XiaomiMiMo/MiMo-Code/releases/tag/v0.1.1)
          draft: false
          prerelease: true
          files: |
            mimocode-linux-ia32.tar.gz
            mimocode-windows-ia32.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
